name: AI code review

on:
  pull_request:
    types: [opened, synchronize]
    # Only run on infrastructure and config changes
    paths:
      - "**.tf"
      - "**.yaml"
      - "**.yml"
      - "**.py"
      - "Dockerfile*"

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write    # needed to post PR comments
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0      # full history needed for accurate diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic httpx

      - name: Generate diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          DIFF_SIZE=$(wc -c < diff.txt)
          echo "diff_size=${DIFF_SIZE}" >> $GITHUB_OUTPUT
          echo "Diff size: ${DIFF_SIZE} bytes"

      - name: Run AI review
        if: steps.diff.outputs.diff_size > 0
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.number }}
        run: python projects/incident-response-bot/scripts/ai_review.py

      - name: Skip — empty diff
        if: steps.diff.outputs.diff_size == 0
        run: echo "No changes to review"
